<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <link rel="stylesheet" href="CSS/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
 
</head>
<body>

<div class="profile-card">

  <div class="image">
    <img src="img/CJ .png" alt="CJ" class="profile-img">
  </div>

  <div class="text-data">
    <span class="name">Carl Johnson</span>
    <span class="job">Aquisitor Não covencional</span>
  </div>

 
  <div class="media-buttons"> 
    
  <a href="#" class="link"><i class="fab fa-facebook-f"></i></a>
  <a href="#" class="link"><i class="fab fa-twitter"></i></a>
  <a href="#" class="link"><i class="fab fa-instagram"></i></a>
  <a href="#" class="link"><i class="fab fa-youtube"></i></a>
</div>
 
  <div class="buttons">
    <button class="button">Subscribe</button>
    <button class="button">Message</button>
  </div>

<div class="analytics">
  <div class="data">
    <i class="fa-regular fa-heart"></i> 
    <span>60k</span>
  </div>

  <div class="data">
    <i class="fa-regular fa-comment"></i> 
    <span>20k</span>
  </div>

  <div class="data">
    <i class="fa-solid fa-share"></i> 
    <span>12k</span>
  </div>
</div>
  </div>
</div>

</div>

</body>
</html>
